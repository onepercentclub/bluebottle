name: Quality Checks
on:
  push:
    branches:
      - main
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  translations:
    name: Translations (Debian ${{ matrix.debian }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - debian: "11"
            container_image: python:3.9-slim-bullseye
          - debian: "13"
            container_image: debian:trixie-slim
    container: ${{ matrix.container_image }}
    steps:
      - name: Install Python 3.9 (Debian 13 only)
        if: matrix.debian == '13'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends python3.9 python3.9-venv python3.9-dev
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.9 1
          update-alternatives --install /usr/bin/python python /usr/bin/python3.9 1
          python3.9 -m ensurepip --upgrade

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Restore cached virtualenv
        uses: actions/cache/restore@v4
        with:
          key: env-${{ hashFiles('setup.py') }}-debian-${{ matrix.debian }}
          path: env

      - name: Create virtualenv
        run: |
          PYTHON_BIN="$(command -v python3.9 || command -v python3 || command -v python)"
          "$PYTHON_BIN" -c "import sys; assert sys.version_info[:2] == (3, 9), f'Expected Python 3.9.x, got {sys.version}'"
          "$PYTHON_BIN" -m pip install --break-system-packages virtualenv 2>/dev/null || "$PYTHON_BIN" -m pip install virtualenv
          "$PYTHON_BIN" -m virtualenv -p "$PYTHON_BIN" env

      - name: Show Python version
        run: |
          source env/bin/activate
          python --version

      - name: Install pip dependencies
        run: |
          source env/bin/activate
          python -m pip install "pip<24.1"
          pip install -e .[dev]

      - name: Saved cached virtualenv
        uses: actions/cache/save@v4
        with:
          key: env-${{ hashFiles('setup.py') }}-debian-${{ matrix.debian }}
          path: env

      - name: Extract messages
        run: |
          source env/bin/activate
          python manage.py makemessages --locale=en --ignore=env --settings=bluebottle.settings.testing

      - name: Check missing translations
        run: |
          source env/bin/activate
          pip install polib
          python ./locale/check_translations.py --locales=nl  > translation-message.txt

      - name: Echo
        run: cat translation-message.txt

      - name: Post comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: translation-message.txt
          refresh-message-position: true

  lint:
    name: Lint (Debian ${{ matrix.debian }})
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        include:
          - debian: "11"
            container_image: python:3.9-slim-bullseye
          - debian: "13"
            container_image: debian:trixie-slim
    container: ${{ matrix.container_image }}
    steps:
      - name: Install Python 3.9 (Debian 13 only)
        if: matrix.debian == '13'
        run: |
          apt-get update
          apt-get install -y --no-install-recommends python3.9 python3.9-venv python3.9-dev
          update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.9 1
          update-alternatives --install /usr/bin/python python /usr/bin/python3.9 1
          python3.9 -m ensurepip --upgrade

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create virtualenv
        run: |
          PYTHON_BIN="$(command -v python3.9 || command -v python3 || command -v python)"
          "$PYTHON_BIN" -c "import sys; assert sys.version_info[:2] == (3, 9), f'Expected Python 3.9.x, got {sys.version}'"
          "$PYTHON_BIN" -m pip install --break-system-packages virtualenv 2>/dev/null || "$PYTHON_BIN" -m pip install virtualenv
          "$PYTHON_BIN" -m virtualenv -p "$PYTHON_BIN" env

      - name: Show Python version
        run: |
          source env/bin/activate
          python --version

      - name: Install pip dependencies
        run: |
          source env/bin/activate
          python -m pip install "pip<24.1"
          pip install -e .[dev]

      - name: Lint
        run: |
          source env/bin/activate
          flake8 .
