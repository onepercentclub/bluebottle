name: Quality Checks
on:
  push:
    branches:
      - main
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PIP_EXTRA: dev
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt

jobs:
  translations:
    name: Translations
    runs-on: self-hosted
    steps:
      - name: Fix workspace permissions (self-hosted)
        run: |
          if [ -n "${GITHUB_WORKSPACE}" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            sudo chown -R "$(whoami):$(id -gn)" "${GITHUB_WORKSPACE}" || true
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python and dependencies
        uses: gabrielfalcao/pyenv-action@v18
        with:
          default: "3.11.4"
          command: |
            set -euo pipefail
            PIP_EXTRA="${PIP_EXTRA:-test}"
            export PIP_DEFAULT_TIMEOUT="${PIP_DEFAULT_TIMEOUT:-120}"
            export PIP_RETRIES="${PIP_RETRIES:-10}"
            cd "${GITHUB_WORKSPACE}"
            VENV_DIR="/home/github_actions/venvs/bluebottle-py311"
            if [ "${PIP_EXTRA}" != "test" ]; then
              VENV_DIR="${VENV_DIR}-${PIP_EXTRA}"
            fi
            if [ ! -x "${VENV_DIR}/bin/python" ] || ! "${VENV_DIR}/bin/python" -c 'import sys; sys.exit(0 if sys.version_info[:2] == (3, 11) else 1)'; then
              rm -rf "${VENV_DIR}"
              python -m venv "${VENV_DIR}"
            fi
            # shellcheck source=/dev/null
            source "${VENV_DIR}/bin/activate"
            venv_ready() {
              python -c "import django, pkg_resources" 2>/dev/null || return 1
              [ "${PIP_EXTRA}" != "dev" ] || python -c "import flake8" 2>/dev/null
            }
            if venv_ready; then
              echo "venv ${VENV_DIR} ready; skipping pip install."
            else
              attempt=1
              while [ "${attempt}" -le 3 ]; do
                if python -m pip install --upgrade "pip==25.3" "setuptools==69.5.1" wheel && \
                   python -m pip install -e ".[${PIP_EXTRA}]"; then
                  break
                fi
                echo "pip install failed (attempt ${attempt}/3)"
                if [ "${attempt}" -eq 3 ]; then
                  exit 1
                fi
                sleep $((attempt * 15))
                attempt=$((attempt + 1))
              done
            fi
            echo "VENV_DIR=${VENV_DIR}" >> "${GITHUB_ENV}"

      - name: Extract messages
        run: |
          source "${VENV_DIR}/bin/activate"
          python manage.py makemessages --locale=en --ignore=env --settings=bluebottle.settings.testing

      - name: Check missing translations
        run: |
          source "${VENV_DIR}/bin/activate"
          python ./locale/check_translations.py --locales=nl --no-fail > translation-message.txt

      - name: Echo
        run: cat translation-message.txt

      - name: Post comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: translation-message.txt
          refresh-message-position: true

      - name: Fail job if translations missing
        run: |
          if grep -q 'Missing translations' translation-message.txt; then
            echo 'Missing translations detected, see PR comment for details.'
            exit 1
          fi

  lint:
    name: Linting
    runs-on: self-hosted
    steps:
      - name: Fix workspace permissions (self-hosted)
        run: |
          if [ -n "${GITHUB_WORKSPACE}" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            sudo chown -R "$(whoami):$(id -gn)" "${GITHUB_WORKSPACE}" || true
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python and dependencies
        uses: gabrielfalcao/pyenv-action@v18
        with:
          default: "3.11.4"
          command: |
            set -euo pipefail
            PIP_EXTRA="${PIP_EXTRA:-test}"
            export PIP_DEFAULT_TIMEOUT="${PIP_DEFAULT_TIMEOUT:-120}"
            export PIP_RETRIES="${PIP_RETRIES:-10}"
            cd "${GITHUB_WORKSPACE}"
            VENV_DIR="/home/github_actions/venvs/bluebottle-py311"
            if [ "${PIP_EXTRA}" != "test" ]; then
              VENV_DIR="${VENV_DIR}-${PIP_EXTRA}"
            fi
            if [ ! -x "${VENV_DIR}/bin/python" ] || ! "${VENV_DIR}/bin/python" -c 'import sys; sys.exit(0 if sys.version_info[:2] == (3, 11) else 1)'; then
              rm -rf "${VENV_DIR}"
              python -m venv "${VENV_DIR}"
            fi
            # shellcheck source=/dev/null
            source "${VENV_DIR}/bin/activate"
            venv_ready() {
              python -c "import django, pkg_resources" 2>/dev/null || return 1
              [ "${PIP_EXTRA}" != "dev" ] || python -c "import flake8" 2>/dev/null
            }
            if venv_ready; then
              echo "venv ${VENV_DIR} ready; skipping pip install."
            else
              attempt=1
              while [ "${attempt}" -le 3 ]; do
                if python -m pip install --upgrade "pip==25.3" "setuptools==69.5.1" wheel && \
                   python -m pip install -e ".[${PIP_EXTRA}]"; then
                  break
                fi
                echo "pip install failed (attempt ${attempt}/3)"
                if [ "${attempt}" -eq 3 ]; then
                  exit 1
                fi
                sleep $((attempt * 15))
                attempt=$((attempt + 1))
              done
            fi
            echo "VENV_DIR=${VENV_DIR}" >> "${GITHUB_ENV}"

      - name: Lint
        run: |
          source "${VENV_DIR}/bin/activate"
          flake8 .
