name: Quality Checks
on:
  push:
    branches:
      - main
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PIP_INDEX_URL: https://pypi.org/simple
  PIP_DEFAULT_TIMEOUT: 120
  PIP_RETRIES: 10
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt

jobs:
  translations:
    name: Translations
    runs-on: self-hosted
    steps:
      - name: Fix workspace permissions (self-hosted)
        run: |
          if [ -n "${GITHUB_WORKSPACE}" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            sudo chown -R "$(whoami):$(id -gn)" "${GITHUB_WORKSPACE}" || true
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore cached virtualenv
        uses: actions/cache/restore@v4
        with:
          key: env-${{ hashFiles('setup.py', 'requirements-ci-bootstrap.txt') }}-py311
          path: env

      - name: Install Python 3.11.4 with pyenv
        run: |
          export PYENV_ROOT="${PYENV_ROOT:-$HOME/.pyenv}"
          export PATH="$PYENV_ROOT/bin:$PATH"
          pyenv install -s 3.11.4

      - name: Create virtualenv (Python 3.11.4)
        run: |
          export PYENV_ROOT="${PYENV_ROOT:-$HOME/.pyenv}"
          export PATH="$PYENV_ROOT/bin:$PATH"
          PYTHON_BIN="$PYENV_ROOT/versions/3.11.4/bin/python"
          "$PYTHON_BIN" -c "import sys; assert sys.version_info[:3] == (3, 11, 4), f'Expected Python 3.11.4, got {sys.version}'"
          if [ ! -x env/bin/python ]; then
            "$PYTHON_BIN" -m venv env
          fi

      - name: Show Python version
        run: |
          source env/bin/activate
          python --version

      - name: Install pip dependencies
        run: |
          set -euxo pipefail
          source env/bin/activate
          python -m pip install --upgrade "pip==25.3" "setuptools==69.5.1" wheel
          export PIP_TRUSTED_HOST="pypi.org files.pythonhosted.org github.com"
          python -m pip install --no-cache-dir \
            --index-url "$PIP_INDEX_URL" \
            --trusted-host pypi.org \
            --trusted-host files.pythonhosted.org \
            -r requirements-ci-bootstrap.txt
          python -m pip install --no-cache-dir \
            --index-url "$PIP_INDEX_URL" \
            --trusted-host pypi.org \
            --trusted-host files.pythonhosted.org \
            --trusted-host github.com \
            -e ".[dev]"

      - name: Save cached virtualenv
        uses: actions/cache/save@v4
        with:
          key: env-${{ hashFiles('setup.py', 'requirements-ci-bootstrap.txt') }}-py311
          path: env

      - name: Extract messages
        run: |
          source env/bin/activate
          python manage.py makemessages --locale=en --ignore=env --settings=bluebottle.settings.testing

      - name: Check missing translations
        run: |
          source env/bin/activate
          python ./locale/check_translations.py --locales=nl --no-fail > translation-message.txt

      - name: Echo
        run: cat translation-message.txt

      - name: Post comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: translation-message.txt
          refresh-message-position: true

      - name: Fail job if translations missing
        run: |
          if grep -q 'Missing translations' translation-message.txt; then
            echo 'Missing translations detected, see PR comment for details.'
            exit 1
          fi

  lint:
    name: Linting
    runs-on: self-hosted
    steps:
      - name: Fix workspace permissions (self-hosted)
        run: |
          if [ -n "${GITHUB_WORKSPACE}" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            sudo chown -R "$(whoami):$(id -gn)" "${GITHUB_WORKSPACE}" || true
          fi

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restore cached virtualenv
        uses: actions/cache/restore@v4
        with:
          key: env-${{ hashFiles('setup.py', 'requirements-ci-bootstrap.txt') }}-py311
          path: env

      - name: Install Python 3.11.4 with pyenv
        run: |
          export PYENV_ROOT="${PYENV_ROOT:-$HOME/.pyenv}"
          export PATH="$PYENV_ROOT/bin:$PATH"
          pyenv install -s 3.11.4

      - name: Create virtualenv (Python 3.11.4)
        run: |
          export PYENV_ROOT="${PYENV_ROOT:-$HOME/.pyenv}"
          export PATH="$PYENV_ROOT/bin:$PATH"
          PYTHON_BIN="$PYENV_ROOT/versions/3.11.4/bin/python"
          "$PYTHON_BIN" -c "import sys; assert sys.version_info[:3] == (3, 11, 4), f'Expected Python 3.11.4, got {sys.version}'"
          if [ ! -x env/bin/python ]; then
            "$PYTHON_BIN" -m venv env
          fi

      - name: Show Python version
        run: |
          source env/bin/activate
          python --version

      - name: Install pip dependencies
        run: |
          set -euxo pipefail
          source env/bin/activate
          python -m pip install --upgrade "pip==25.3" "setuptools==69.5.1" wheel
          export PIP_TRUSTED_HOST="pypi.org files.pythonhosted.org github.com"
          python -m pip install --no-cache-dir \
            --index-url "$PIP_INDEX_URL" \
            --trusted-host pypi.org \
            --trusted-host files.pythonhosted.org \
            -r requirements-ci-bootstrap.txt
          python -m pip install --no-cache-dir \
            --index-url "$PIP_INDEX_URL" \
            --trusted-host pypi.org \
            --trusted-host files.pythonhosted.org \
            --trusted-host github.com \
            -e ".[dev]"

      - name: Save cached virtualenv
        uses: actions/cache/save@v4
        with:
          key: env-${{ hashFiles('setup.py', 'requirements-ci-bootstrap.txt') }}-py311
          path: env

      - name: Lint
        run: |
          source env/bin/activate
          flake8 .
