name: Quality Checks
on:
  push:
    branches:
      - main
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  translations:
    name: Translations
    runs-on: self-hosted
    steps:
      - name: Fix workspace permissions (self-hosted)
        run: |
          if [ -n "${GITHUB_WORKSPACE}" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            sudo chown -R "$(whoami):$(id -gn)" "${GITHUB_WORKSPACE}" || true
          fi

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Restore cached virtualenv
        uses: actions/cache/restore@v4
        with:
          key: env-${{ hashFiles('setup.py') }}-py39
          path: env

      - name: Set up pyenv and Python 3.9
        uses: actions/cache/restore@v4
        with:
          key: pyenv-3.9-${{ runner.os }}
          path: ~/.pyenv
        continue-on-error: true

      - name: Install pyenv and Python 3.9
        run: |
          export PYENV_ROOT="${PYENV_ROOT:-$HOME/.pyenv}"
          if [[ ! -x "$PYENV_ROOT/bin/pyenv" ]]; then
            git clone --depth 1 https://github.com/pyenv/pyenv.git "$PYENV_ROOT"
            export PATH="$PYENV_ROOT/bin:$PATH"
            # Build dependencies for Python (Debian/Ubuntu)
            sudo apt-get update -qq
            sudo apt-get install -y -qq build-essential libssl-dev zlib1g-dev libbz2-dev \
              libreadline-dev libsqlite3-dev libncurses5-dev libncursesw5-dev xz-utils \
              tk-dev libffi-dev liblzma-dev
            pyenv install -s 3.9.21
          else
            export PATH="$PYENV_ROOT/bin:$PATH"
          fi
          echo "PYENV_ROOT=$PYENV_ROOT" >> $GITHUB_ENV
          echo "$PYENV_ROOT/bin" >> $GITHUB_PATH
          pyenv rehash 2>/dev/null || true

      - name: Cache pyenv
        uses: actions/cache/save@v4
        with:
          key: pyenv-3.9-${{ runner.os }}
          path: ~/.pyenv
        if: success()

      - name: Create virtualenv
        run: |
          export PYENV_ROOT="${PYENV_ROOT:-$HOME/.pyenv}"
          export PATH="$PYENV_ROOT/bin:$PATH"
          PYTHON_BIN="$(pyenv root)/versions/3.9.21/bin/python"
          if [[ ! -x "$PYTHON_BIN" ]]; then
            pyenv install -s 3.9.21
            PYTHON_BIN="$(pyenv root)/versions/3.9.21/bin/python"
          fi
          "$PYTHON_BIN" -c "import sys; assert sys.version_info[:2] == (3, 9), f'Expected Python 3.9.x, got {sys.version}'"
          "$PYTHON_BIN" -m venv env

      - name: Show Python version
        run: |
          source env/bin/activate
          python --version

      - name: Install pip dependencies
        run: |
          source env/bin/activate
          python -m pip install "pip<24.1"
          pip install -e .[dev]

      - name: Saved cached virtualenv
        uses: actions/cache/save@v4
        with:
          key: env-${{ hashFiles('setup.py') }}-py39
          path: env

      - name: Extract messages
        run: |
          source env/bin/activate
          python manage.py makemessages --locale=en --ignore=env --settings=bluebottle.settings.testing

      - name: Check missing translations
        run: |
          source env/bin/activate
          pip install polib
          python ./locale/check_translations.py --locales=nl  > translation-message.txt

      - name: Echo
        run: cat translation-message.txt

      - name: Post comment
        uses: mshick/add-pr-comment@v2
        with:
          message-path: translation-message.txt
          refresh-message-position: true

  lint:
    name: Linting
    runs-on: self-hosted
    steps:
      - name: Fix workspace permissions (self-hosted)
        run: |
          if [ -n "${GITHUB_WORKSPACE}" ] && [ -d "${GITHUB_WORKSPACE}" ]; then
            sudo chown -R "$(whoami):$(id -gn)" "${GITHUB_WORKSPACE}" || true
          fi

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up pyenv and Python 3.9
        uses: actions/cache/restore@v4
        with:
          key: pyenv-3.9-${{ runner.os }}
          path: ~/.pyenv
        continue-on-error: true

      - name: Install pyenv and Python 3.9
        run: |
          export PYENV_ROOT="${PYENV_ROOT:-$HOME/.pyenv}"
          if [[ ! -x "$PYENV_ROOT/bin/pyenv" ]]; then
            git clone --depth 1 https://github.com/pyenv/pyenv.git "$PYENV_ROOT"
            export PATH="$PYENV_ROOT/bin:$PATH"
            sudo apt-get update -qq
            sudo apt-get install -y -qq build-essential libssl-dev zlib1g-dev libbz2-dev \
              libreadline-dev libsqlite3-dev libncurses5-dev libncursesw5-dev xz-utils \
              tk-dev libffi-dev liblzma-dev
            pyenv install -s 3.9.21
          else
            export PATH="$PYENV_ROOT/bin:$PATH"
          fi
          echo "PYENV_ROOT=$PYENV_ROOT" >> $GITHUB_ENV
          echo "$PYENV_ROOT/bin" >> $GITHUB_PATH
          pyenv rehash 2>/dev/null || true

      - name: Cache pyenv
        uses: actions/cache/save@v4
        with:
          key: pyenv-3.9-${{ runner.os }}
          path: ~/.pyenv
        if: success()

      - name: Create virtualenv
        run: |
          export PYENV_ROOT="${PYENV_ROOT:-$HOME/.pyenv}"
          export PATH="$PYENV_ROOT/bin:$PATH"
          PYTHON_BIN="$(pyenv root)/versions/3.9.21/bin/python"
          if [[ ! -x "$PYTHON_BIN" ]]; then
            pyenv install -s 3.9.21
            PYTHON_BIN="$(pyenv root)/versions/3.9.21/bin/python"
          fi
          "$PYTHON_BIN" -c "import sys; assert sys.version_info[:2] == (3, 9), f'Expected Python 3.9.x, got {sys.version}'"
          "$PYTHON_BIN" -m venv env

      - name: Show Python version
        run: |
          source env/bin/activate
          python --version

      - name: Install pip dependencies
        run: |
          source env/bin/activate
          python -m pip install "pip<24.1"
          pip install -e .[dev]

      - name: Lint
        run: |
          source env/bin/activate
          flake8 .
