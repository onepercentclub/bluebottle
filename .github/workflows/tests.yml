name: Testing

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  DJANGO_SETTINGS_MODULE: bluebottle.settings.runner
  LANG: en_GB.UTF-8
  LC_ALL: en_GB.UTF-8
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
  PG_CLI_IMAGE: postgis/postgis:14-3.3
  TEST_DB_NAME: test_bluebottle_test
  TEST_DB_USER: testuser
  TEST_DB_PASSWORD: password
  POSTGRES_PASSWORD: postgres

jobs:
  test-without-elasticsearch:
    name: Tests (without Elasticsearch)
    runs-on: Bluebottle
    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgis/postgis:14-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      BLUEBOTTLE_SKIP_ES_TEST_SETUP: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export service ports
        run: |
          echo "PGHOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "PGPORT=${{ job.services.postgres.ports[5432] }}" >> "$GITHUB_ENV"

      - name: Install system dependencies (host)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            locales \
            libxmlsec1-dev \
            libgdal-dev \
            swig \
            libjpeg-dev \
            zlib1g-dev
          sudo sed -i 's/^# *\(en_GB.UTF-8 UTF-8\)/\1/' /etc/locale.gen
          sudo locale-gen
          sudo update-locale LANG=en_GB.UTF-8

      - name: Set up Python and dependencies
        uses: gabrielfalcao/pyenv-action@v18
        with:
          default: "3.11.4"
          command: |
            set -euo pipefail
            PIP_EXTRA="${PIP_EXTRA:-test}"
            export PIP_DEFAULT_TIMEOUT="${PIP_DEFAULT_TIMEOUT:-120}"
            export PIP_RETRIES="${PIP_RETRIES:-10}"
            cd "${GITHUB_WORKSPACE}"
            VENV_DIR="/home/github_actions/venvs/bluebottle-py311"
            if [ "${PIP_EXTRA}" != "test" ]; then
              VENV_DIR="${VENV_DIR}-${PIP_EXTRA}"
            fi
            if [ ! -x "${VENV_DIR}/bin/python" ] || ! "${VENV_DIR}/bin/python" -c 'import sys; sys.exit(0 if sys.version_info[:2] == (3, 11) else 1)'; then
              rm -rf "${VENV_DIR}"
              python -m venv "${VENV_DIR}"
            fi
            # shellcheck source=/dev/null
            source "${VENV_DIR}/bin/activate"
            if python -c "import django, pkg_resources" 2>/dev/null; then
              echo "venv ${VENV_DIR} ready; skipping pip install."
            else
              attempt=1
              while [ "${attempt}" -le 3 ]; do
                if python -m pip install --upgrade "pip==25.3" "setuptools==69.5.1" wheel && \
                   python -m pip install -e ".[${PIP_EXTRA}]"; then
                  break
                fi
                echo "pip install failed (attempt ${attempt}/3)"
                if [ "${attempt}" -eq 3 ]; then
                  exit 1
                fi
                sleep $((attempt * 15))
                attempt=$((attempt + 1))
              done
            fi
            echo "VENV_DIR=${VENV_DIR}" >> "${GITHUB_ENV}"

      - name: Bootstrap database
        run: |
          PGPASSWORD="${POSTGRES_PASSWORD}" docker run --rm -i --network host \
            -e "PGPASSWORD=${POSTGRES_PASSWORD}" \
            -v "${GITHUB_WORKSPACE}:/workspace:ro" \
            "${PG_CLI_IMAGE}" \
            psql \
              -h "${PGHOST}" \
              -p "${PGPORT}" \
              -U postgres \
              -d postgres \
              -v "TEST_DB_NAME=${TEST_DB_NAME}" \
              -v "TEST_DB_USER=${TEST_DB_USER}" \
              -v "TEST_DB_PASSWORD=${TEST_DB_PASSWORD}" \
              -v "PGHOST=${PGHOST}" \
              -v "PGPORT=${PGPORT}" \
              -f /workspace/.github/sql/bootstrap-test-database.sql

      - name: Run tests
        shell: bash
        run: |
          set -euxo pipefail
          source "${VENV_DIR}/bin/activate"
          python manage.py test \
            --parallel 12 \
            --keepdb \
            --exclude-tag=elasticsearch \
            --settings bluebottle.settings.runner \
            -v3

  test-elasticsearch:
    name: Tests (Elasticsearch)
    runs-on: Bluebottle
    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgis/postgis:14-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.22
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms1g -Xmx1g"
        ports:
          - 9200/tcp
        options: >-
          --health-cmd="curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' | grep -q '\"timed_out\":false' || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export service ports
        run: |
          echo "PGHOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "PGPORT=${{ job.services.postgres.ports[5432] }}" >> "$GITHUB_ENV"
          echo "ESHOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "ESPORT=${{ job.services.elasticsearch.ports[9200] }}" >> "$GITHUB_ENV"

      - name: Install system dependencies (host)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            locales \
            libxmlsec1-dev \
            libgdal-dev \
            swig \
            libjpeg-dev \
            zlib1g-dev
          sudo sed -i 's/^# *\(en_GB.UTF-8 UTF-8\)/\1/' /etc/locale.gen
          sudo locale-gen
          sudo update-locale LANG=en_GB.UTF-8

      - name: Set up Python and dependencies
        uses: gabrielfalcao/pyenv-action@v18
        with:
          default: "3.11.4"
          command: |
            set -euo pipefail
            PIP_EXTRA="${PIP_EXTRA:-test}"
            export PIP_DEFAULT_TIMEOUT="${PIP_DEFAULT_TIMEOUT:-120}"
            export PIP_RETRIES="${PIP_RETRIES:-10}"
            cd "${GITHUB_WORKSPACE}"
            VENV_DIR="/home/github_actions/venvs/bluebottle-py311"
            if [ "${PIP_EXTRA}" != "test" ]; then
              VENV_DIR="${VENV_DIR}-${PIP_EXTRA}"
            fi
            if [ ! -x "${VENV_DIR}/bin/python" ] || ! "${VENV_DIR}/bin/python" -c 'import sys; sys.exit(0 if sys.version_info[:2] == (3, 11) else 1)'; then
              rm -rf "${VENV_DIR}"
              python -m venv "${VENV_DIR}"
            fi
            # shellcheck source=/dev/null
            source "${VENV_DIR}/bin/activate"
            if python -c "import django, pkg_resources" 2>/dev/null; then
              echo "venv ${VENV_DIR} ready; skipping pip install."
            else
              attempt=1
              while [ "${attempt}" -le 3 ]; do
                if python -m pip install --upgrade "pip==25.3" "setuptools==69.5.1" wheel && \
                   python -m pip install -e ".[${PIP_EXTRA}]"; then
                  break
                fi
                echo "pip install failed (attempt ${attempt}/3)"
                if [ "${attempt}" -eq 3 ]; then
                  exit 1
                fi
                sleep $((attempt * 15))
                attempt=$((attempt + 1))
              done
            fi
            echo "VENV_DIR=${VENV_DIR}" >> "${GITHUB_ENV}"

      - name: Bootstrap database
        run: |
          PGPASSWORD="${POSTGRES_PASSWORD}" docker run --rm -i --network host \
            -e "PGPASSWORD=${POSTGRES_PASSWORD}" \
            -v "${GITHUB_WORKSPACE}:/workspace:ro" \
            "${PG_CLI_IMAGE}" \
            psql \
              -h "${PGHOST}" \
              -p "${PGPORT}" \
              -U postgres \
              -d postgres \
              -v "TEST_DB_NAME=${TEST_DB_NAME}" \
              -v "TEST_DB_USER=${TEST_DB_USER}" \
              -v "TEST_DB_PASSWORD=${TEST_DB_PASSWORD}" \
              -v "PGHOST=${PGHOST}" \
              -v "PGPORT=${PGPORT}" \
              -f /workspace/.github/sql/bootstrap-test-database.sql

      - name: Run Elasticsearch tests
        shell: bash
        run: |
          set -euxo pipefail
          source "${VENV_DIR}/bin/activate"
          python manage.py test \
            --parallel 8 \
            --keepdb \
            --tag=elasticsearch \
            --settings bluebottle.settings.runner \
            -v3
