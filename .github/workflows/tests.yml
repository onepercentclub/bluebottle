name: Testing

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  DJANGO_SETTINGS_MODULE: bluebottle.settings.runner
  LANG: en_GB.UTF-8
  LC_ALL: en_GB.UTF-8
  PYTHON_VERSION: "3.11.4"
  PYENV_ROOT: /home/github_actions/.pyenv
  SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
  PG_CLI_IMAGE: postgis/postgis:14-3.3

jobs:
  test-without-elasticsearch:
    name: Tests (without Elasticsearch)
    runs-on: Bluebottle
    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgis/postgis:14-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      BLUEBOTTLE_SKIP_ES_TEST_SETUP: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export service ports
        run: |
          echo "PGHOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "PGPORT=${{ job.services.postgres.ports[5432] }}" >> "$GITHUB_ENV"

      - name: Install system dependencies (host)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            locales \
            libxmlsec1-dev \
            libgdal-dev \
            swig \
            libjpeg-dev \
            zlib1g-dev
          sudo sed -i 's/^# *\(en_GB.UTF-8 UTF-8\)/\1/' /etc/locale.gen
          sudo locale-gen
          sudo update-locale LANG=en_GB.UTF-8

      - name: Set up Python and dependencies
        run: bash .github/scripts/setup-test-python.sh

      - name: Bootstrap database
        run: bash .github/scripts/bootstrap-test-database.sh

      - name: Run tests
        shell: bash
        run: |
          set -euxo pipefail
          source .github/scripts/activate-ci-python.sh
          python manage.py test \
            --parallel 12 \
            --keepdb \
            --exclude-tag=elasticsearch \
            --settings bluebottle.settings.runner \
            -v3

  test-elasticsearch:
    name: Tests (Elasticsearch)
    runs-on: Bluebottle
    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgis/postgis:14-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.22
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms1g -Xmx1g"
        ports:
          - 9200/tcp
        options: >-
          --health-cmd="curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' | grep -q '\"timed_out\":false' || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export service ports
        run: |
          echo "PGHOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "PGPORT=${{ job.services.postgres.ports[5432] }}" >> "$GITHUB_ENV"
          echo "ESHOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "ESPORT=${{ job.services.elasticsearch.ports[9200] }}" >> "$GITHUB_ENV"

      - name: Install system dependencies (host)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            locales \
            libxmlsec1-dev \
            libgdal-dev \
            swig \
            libjpeg-dev \
            zlib1g-dev
          sudo sed -i 's/^# *\(en_GB.UTF-8 UTF-8\)/\1/' /etc/locale.gen
          sudo locale-gen
          sudo update-locale LANG=en_GB.UTF-8

      - name: Set up Python and dependencies
        run: bash .github/scripts/setup-test-python.sh

      - name: Bootstrap database
        run: bash .github/scripts/bootstrap-test-database.sh

      - name: Run Elasticsearch tests
        shell: bash
        run: |
          set -euxo pipefail
          source .github/scripts/activate-ci-python.sh
          python manage.py test \
            --parallel 8 \
            --keepdb \
            --tag=elasticsearch \
            --settings bluebottle.settings.runner \
            -v3
